name: Publish

# Publishes on a GitHub Release, or manually via the Actions tab.
# Requires repo secrets: PYPI_TOKEN (PyPI API token), NPM_TOKEN (npm automation token).
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  pypi:
    name: Publish prooflink to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Upload
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload --non-interactive dist/*

  npm:
    name: Publish @itechsmart/prooflink to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

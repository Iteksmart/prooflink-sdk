name: Publish

# Fully credential-free publishing via OIDC Trusted Publishing:
#   - PyPI  (pypa/gh-action-pypi-publish)
#   - npm   (npm >= 11.5.1 trusted publishing + provenance)
# No stored tokens. Requires trusted publishers configured on PyPI and npm.
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  pypi:
    name: Publish prooflink to PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true  # idempotent: re-runs don't fail on an existing version

  npm:
    name: Publish @itechsmart/prooflink to npm (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest  # trusted publishing requires npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - name: Publish to npm (OIDC + provenance)
        run: npm publish --access public --provenance
        # No NODE_AUTH_TOKEN: npm verifies the GitHub OIDC identity against the
        # trusted publisher configured on the package.

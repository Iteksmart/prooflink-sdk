name: Publish

# PyPI via OIDC Trusted Publishing (no stored token).
# npm via NPM_TOKEN repo secret (job skips gracefully until the secret is set).
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  pypi:
    name: Publish prooflink to PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # REQUIRED for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token: PyPI verifies the GitHub OIDC identity.

  npm:
    name: Publish @itechsmart/prooflink to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: Publish (skips if NPM_TOKEN is not set)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not configured — skipping npm publish. Add the repo secret to enable."
            exit 0
          fi
          npm publish --access public
